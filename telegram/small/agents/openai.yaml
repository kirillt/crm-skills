interface:
  display_name: "Telegram Small"
  short_description: "Sync communication notes from small chats in Telegram"
  default_prompt: "Use $telegram-small-chats with $bundle to start a fresh three-phase run from state/telegram/last-sync.json instead of resuming the historical singleton scratch file; read config/telegram/main.json first; accept either no argument, one integer day-count, one <number> <unit> duration where the unit is day(s), week(s), or month(s), `batch <N>`, or one duration followed by `batch <N>`; with no duration argument use the full available window from <small-chats-sync> through today; with integer N treat it as N days; with <number> <unit>, derive <effective-end-date> by adding N days, 7*N days, or N calendar months to <small-chats-sync>; derive the default discovery batch size from config `discover-batch-size` and the default persistence batch size from config `persist-batch-size`; if `batch <N>` is present, override both sizes for this invocation only; use one parent scratch task; run the Discovery phase and Persistence phase through $batch inside that parent task; materialize the current small-chat collection with .agents/skills/telegram/scripts/list.py small --since <small-chats-sync> --until <effective-end-date>; during the Discovery phase, use the window only to select chats, then ensure full conversation cache for every Discovery phase row with .agents/skills/telegram/scripts/sync.py --since <small-chats-sync> --until <effective-end-date> --full-conversation --skip-cached <target>; read the full cached conversation before proposing track/catch up/discard; use about-us/intro.md and the repo's about-us/rubrics.py as positioning sources; treat same-domain contacts and likely lead/referral/partner-routing sources as business-relevant even without a defended employer; do not discard solely because a thread is outbound-only, one-way, or unanswered, since tracking attempted outreach helps avoid duplicate contact; show mandatory proposal batch tables using the known action types track/catch up/discard; the Persistence phase applies approved canonical updates from the Discovery phase cache and uses --all only for explicit debug full-history re-syncs; route first-touch entities through the consider skills; and only advance the small-chat sync state to <effective-end-date> after the Finalization phase completes."
